<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Solicitud de servicios a domicilio" />
  <title>Servicio a Domicilio</title>
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  />
  <style>
    :root {
      --bg: #f4f7fb;
      --surface: #ffffff;
      --line: #d8dee9;
      --text: #1f2937;
      --muted: #64748b;
      --brand: #0ea5e9;
      --brand-dark: #0284c7;
      --accent: #14b8a6;
      --ok: #16a34a;
      --danger: #dc2626;
      --radius: 16px;
      --shadow: 0 16px 30px rgba(15, 23, 42, 0.12);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
      background:
        radial-gradient(circle at 95% 5%, rgba(20, 184, 166, 0.18), transparent 32%),
        radial-gradient(circle at 5% 95%, rgba(14, 165, 233, 0.16), transparent 35%),
        var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    .wrap {
      max-width: 1100px;
      margin: 0 auto;
      padding: 26px 16px 36px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      margin-bottom: 18px;
    }

    .topbar a {
      text-decoration: none;
      color: var(--brand-dark);
      font-weight: 700;
      background: #e0f2fe;
      padding: 10px 14px;
      border-radius: 999px;
      border: 1px solid #bae6fd;
    }

    h1 {
      margin: 0;
      font-size: clamp(1.4rem, 3vw, 2rem);
      line-height: 1.15;
    }

    .subtitle {
      margin-top: 6px;
      color: var(--muted);
      font-size: 0.98rem;
    }

    .layout {
      display: grid;
      grid-template-columns: 1.1fr 0.9fr;
      gap: 18px;
      margin-top: 16px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .card-header {
      padding: 14px 16px;
      border-bottom: 1px solid var(--line);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
    }

    .card-title {
      margin: 0;
      font-size: 1rem;
      font-weight: 800;
    }

    .live-tag {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: var(--ok);
      font-size: 0.82rem;
      font-weight: 700;
    }

    .live-dot {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: var(--ok);
      box-shadow: 0 0 0 6px rgba(22, 163, 74, 0.16);
      animation: pulse 1.8s infinite;
    }

    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.24); }
      100% { transform: scale(1); }
    }

    .map {
      aspect-ratio: 16 / 10;
      position: relative;
      overflow: hidden;
      border-bottom: 1px solid var(--line);
    }

    .map-canvas {
      width: 100%;
      height: 100%;
      min-height: 340px;
    }

    .map-canvas .leaflet-control-attribution {
      font-size: 11px;
    }

    .emoji-marker {
      width: 30px;
      height: 30px;
      border-radius: 999px;
      background: #ffffff;
      border: 2px solid #38bdf8;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      box-shadow: 0 6px 16px rgba(14, 165, 233, 0.25);
    }

    .user-dot {
      width: 14px;
      height: 14px;
      border-radius: 999px;
      background: #0ea5e9;
      border: 2px solid #ffffff;
      box-shadow: 0 0 0 6px rgba(14, 165, 233, 0.22);
    }

    .base-dot {
      width: 14px;
      height: 14px;
      border-radius: 999px;
      background: #14b8a6;
      border: 2px solid #ffffff;
      box-shadow: 0 0 0 6px rgba(20, 184, 166, 0.22);
    }

    .map-footer {
      padding: 12px 16px;
      border-top: 1px solid var(--line);
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
      font-size: 0.9rem;
      color: var(--muted);
    }

    .eta {
      font-weight: 800;
      color: #0369a1;
      background: #e0f2fe;
      padding: 6px 10px;
      border-radius: 999px;
      border: 1px solid #bae6fd;
    }

    .form {
      padding: 14px;
      display: grid;
      gap: 12px;
    }

    .services {
      display: grid;
      gap: 8px;
      grid-template-columns: 1fr 1fr;
    }

    .service-btn {
      border: 1px solid var(--line);
      background: #fff;
      border-radius: 12px;
      padding: 11px 10px;
      text-align: left;
      font-weight: 700;
      cursor: pointer;
      color: #334155;
      transition: transform .15s ease, border-color .2s ease, background .2s ease;
    }

    .service-btn:hover { transform: translateY(-1px); border-color: #7dd3fc; }

    .service-btn.active {
      border-color: #38bdf8;
      background: #f0f9ff;
      color: #075985;
      box-shadow: inset 0 0 0 1px #38bdf8;
    }

    label {
      font-size: .85rem;
      color: #475569;
      font-weight: 700;
    }

    input,
    select,
    textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 10px 12px;
      font: inherit;
      color: var(--text);
      background: #fff;
      outline: none;
    }

    input:focus,
    select:focus,
    textarea:focus {
      border-color: #38bdf8;
      box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.2);
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .actions {
      display: grid;
      gap: 8px;
      margin-top: 4px;
    }

    .btn-main,
    .btn-alt {
      border: none;
      border-radius: 12px;
      padding: 11px 14px;
      font-weight: 800;
      cursor: pointer;
    }

    .btn-main {
      background: linear-gradient(90deg, var(--brand), var(--accent));
      color: #042f2e;
      box-shadow: 0 10px 20px rgba(20, 184, 166, 0.24);
    }

    .btn-alt {
      border: 1px solid var(--line);
      background: #fff;
      color: #334155;
    }

    .result {
      border: 1px dashed #7dd3fc;
      border-radius: 12px;
      background: #f0f9ff;
      padding: 12px;
      font-size: .9rem;
      line-height: 1.5;
      color: #0c4a6e;
      min-height: 66px;
    }

    .result.error {
      background: #fef2f2;
      border-color: #fca5a5;
      color: var(--danger);
    }

    @media (max-width: 900px) {
      .layout { grid-template-columns: 1fr; }
    }

    @media (max-width: 560px) {
      .services { grid-template-columns: 1fr; }
      .row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <div>
        <h1>Solicitar Servicio a Domicilio</h1>
        <p class="subtitle">Selecciona un tipo de servicio, indica tu direccion y confirma.</p>
      </div>
      <a href="../">Volver al portal</a>
    </div>

    <section class="layout">
      <article class="card" aria-label="Mapa de cobertura">
        <header class="card-header">
          <h2 class="card-title">Mapa interactivo de cobertura</h2>
          <span class="live-tag"><span class="live-dot"></span>En linea</span>
        </header>

        <div class="map" aria-label="Mapa simulado mostrando origen y destino">
          <div id="mapCanvas" class="map-canvas"></div>
        </div>

        <footer class="map-footer">
          <span id="mapStatus">Servicio seleccionado: un viaje</span>
          <span class="eta" id="etaBadge">ETA 12 min</span>
        </footer>
      </article>

      <article class="card" aria-label="Formulario de solicitud">
        <header class="card-header">
          <h2 class="card-title">Menu de servicios</h2>
        </header>

        <form class="form" id="serviceForm" novalidate>
          <div class="services" id="servicesMenu">
            <button class="service-btn active" type="button" data-service="un viaje">Un viaje</button>
            <button class="service-btn" type="button" data-service="un doctor">Un doctor</button>
            <button class="service-btn" type="button" data-service="una cita">Una cita</button>
            <button class="service-btn" type="button" data-service="un encuentro">Un encuentro</button>
          </div>

          <div>
            <label for="address">Direccion del domicilio</label>
            <input id="address" name="address" type="text" placeholder="Ej. Av. Reforma 321, CDMX" required />
          </div>

          <div class="row">
            <div>
              <label for="schedule">Horario</label>
              <select id="schedule" name="schedule">
                <option value="ahora">Lo antes posible</option>
                <option value="30">En 30 minutos</option>
                <option value="60">En 1 hora</option>
                <option value="120">En 2 horas</option>
              </select>
            </div>
            <div>
              <label for="phone">Telefono de contacto</label>
              <input id="phone" name="phone" type="tel" placeholder="+52 55 0000 0000" required />
            </div>
          </div>

          <div>
            <label for="notes">Notas para el servicio</label>
            <textarea id="notes" name="notes" rows="3" placeholder="Referencias, torre, piso, etc."></textarea>
          </div>

          <div class="actions">
            <button class="btn-main" type="submit">Solicitar servicio</button>
            <button class="btn-alt" id="resetBtn" type="button">Limpiar formulario</button>
          </div>

          <div class="result" id="resultBox" aria-live="polite">
            Completa el formulario para generar tu solicitud.
          </div>
        </form>
      </article>
    </section>
  </div>

  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""
  ></script>
  <script>
    const serviceMeta = {
      "un viaje": {
        eta: 12,
        icon: "🚕",
        destination: [19.4289, -99.1276],
      },
      "un doctor": {
        eta: 18,
        icon: "🩺",
        destination: [19.4344, -99.1416],
      },
      "una cita": {
        eta: 25,
        icon: "🗓️",
        destination: [19.4235, -99.1514],
      },
      "un encuentro": {
        eta: 15,
        icon: "🤝",
        destination: [19.4388, -99.1343],
      },
    };

    let selectedService = "un viaje";
    const userLocation = [19.4326, -99.1332];
    const baseLocation = [19.4418, -99.1389];

    const map = L.map("mapCanvas", {
      zoomControl: true,
      scrollWheelZoom: false,
    }).setView(userLocation, 13);

    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
      maxZoom: 19,
      attribution: "&copy; OpenStreetMap contributors",
    }).addTo(map);

    const userMarker = L.marker(userLocation, {
      icon: L.divIcon({
        className: "",
        html: '<div class="user-dot"></div>',
        iconSize: [18, 18],
        iconAnchor: [9, 9],
      }),
    }).addTo(map).bindPopup("Tu domicilio");

    const baseMarker = L.marker(baseLocation, {
      icon: L.divIcon({
        className: "",
        html: '<div class="base-dot"></div>',
        iconSize: [18, 18],
        iconAnchor: [9, 9],
      }),
    }).addTo(map).bindPopup("Base de servicio");

    let serviceMarker = null;
    let routeLine = null;

    const serviceButtons = document.querySelectorAll(".service-btn");
    const mapStatus = document.getElementById("mapStatus");
    const etaBadge = document.getElementById("etaBadge");
    const addressInput = document.getElementById("address");
    const resultBox = document.getElementById("resultBox");
    const form = document.getElementById("serviceForm");

    const randomAddresses = [
      "Av. Reforma 321, Juarez, CDMX",
      "Insurgentes Sur 1450, Del Valle, CDMX",
      "Calz. de Tlalpan 980, Nativitas, CDMX",
      "Eje Central 210, Centro, CDMX",
      "Av. Universidad 740, Santa Cruz Atoyac, CDMX",
      "Rio Lerma 102, Cuauhtemoc, CDMX",
      "Av. Patriotismo 415, San Pedro de los Pinos, CDMX",
      "Miguel Angel de Quevedo 475, Coyoacan, CDMX",
    ];

    function updateMap(service) {
      const meta = serviceMeta[service];
      mapStatus.textContent = `Servicio seleccionado: ${service}`;
      etaBadge.textContent = `ETA ${meta.eta} min`;

      if (serviceMarker) {
        map.removeLayer(serviceMarker);
      }
      if (routeLine) {
        map.removeLayer(routeLine);
      }

      serviceMarker = L.marker(meta.destination, {
        icon: L.divIcon({
          className: "",
          html: `<div class="emoji-marker">${meta.icon}</div>`,
          iconSize: [30, 30],
          iconAnchor: [15, 15],
        }),
      }).addTo(map).bindPopup(`Destino: ${service}`);

      routeLine = L.polyline([baseLocation, meta.destination, userLocation], {
        color: "#0ea5e9",
        weight: 4,
        opacity: 0.8,
        dashArray: "8 8",
      }).addTo(map);

      map.fitBounds(routeLine.getBounds(), { padding: [30, 30] });
    }

    serviceButtons.forEach((btn) => {
      btn.addEventListener("click", () => {
        serviceButtons.forEach((b) => b.classList.remove("active"));
        btn.classList.add("active");
        selectedService = btn.dataset.service;
        updateMap(selectedService);
      });
    });

    map.on("click", () => {
      const randomAddress = randomAddresses[Math.floor(Math.random() * randomAddresses.length)];
      addressInput.value = randomAddress;
      addressInput.dispatchEvent(new Event("input", { bubbles: true }));
    });

    form.addEventListener("submit", (e) => {
      e.preventDefault();

      const address = document.getElementById("address").value.trim();
      const phone = document.getElementById("phone").value.trim();
      const schedule = document.getElementById("schedule").value;
      const notes = document.getElementById("notes").value.trim();

      if (!address || !phone) {
        resultBox.classList.add("error");
        resultBox.textContent = "Ingresa direccion y telefono para continuar.";
        return;
      }

      resultBox.classList.remove("error");
      const eta = serviceMeta[selectedService].eta;
      const scheduleLabel =
        schedule === "ahora" ? "lo antes posible" : `en ${schedule} minutos`;

      resultBox.innerHTML =
        `<strong>Solicitud enviada</strong><br>` +
        `Servicio: ${selectedService}<br>` +
        `Domicilio: ${address}<br>` +
        `Horario: ${scheduleLabel}<br>` +
        `Tiempo estimado: ${eta} min<br>` +
        `Telefono: ${phone}` +
        (notes ? `<br>Notas: ${notes}` : "");
    });

    document.getElementById("resetBtn").addEventListener("click", () => {
      form.reset();
      resultBox.classList.remove("error");
      resultBox.textContent = "Completa el formulario para generar tu solicitud.";
    });

    updateMap(selectedService);
  </script>
</body>
</html>
