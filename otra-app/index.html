<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Tetris retro jugable estilo 1990" />
  <title>Tetris 1990</title>
  <style>
    :root {
      --bg: #0a1023;
      --surface: #11192f;
      --line: #2a3a64;
      --text: #e5ebff;
      --muted: #9bb0e5;
      --btn: #1f2f58;
      --btn-h: #2a4179;
      --accent: #41f7aa;
      --danger: #ff5f7a;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Courier New", Courier, monospace;
      background:
        radial-gradient(circle at 14% 10%, #1d4ed844 0%, transparent 40%),
        radial-gradient(circle at 90% 88%, #06b6d444 0%, transparent 40%),
        var(--bg);
      color: var(--text);
      padding: 14px;
      display: grid;
      place-items: center;
    }

    .frame {
      width: min(980px, 100%);
      background: linear-gradient(180deg, #121b34, #0f172a);
      border: 2px solid #314777;
      border-radius: 14px;
      box-shadow: 0 20px 50px rgba(0, 0, 0, .45);
      padding: 16px;
    }

    .top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 12px;
    }

    h1 {
      margin: 0;
      letter-spacing: 1px;
      font-size: clamp(1.25rem, 3vw, 1.8rem);
      color: #b6f0ff;
      text-shadow: 0 0 8px rgba(65, 247, 170, .35);
    }

    .portal {
      text-decoration: none;
      color: var(--text);
      border: 1px solid #4c649b;
      border-radius: 8px;
      padding: 8px 10px;
      background: #1a2a4c;
      font-size: .86rem;
      font-weight: 700;
    }

    .layout {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 14px;
    }

    .board-wrap {
      border: 2px solid #4463a6;
      border-radius: 8px;
      background: #0a1327;
      padding: 8px;
      width: fit-content;
      position: relative;
    }

    canvas#board {
      width: 300px;
      height: 600px;
      display: block;
      image-rendering: pixelated;
      background: #060d1d;
      border: 1px solid #2a3a64;
      touch-action: none;
    }

    .side {
      display: grid;
      gap: 10px;
      align-content: start;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px;
    }

    .card h2 {
      margin: 0 0 8px;
      font-size: .95rem;
      color: #8ad4ff;
    }

    .stat {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 5px 0;
      font-size: .9rem;
      border-bottom: 1px dashed #33456f;
    }

    .stat:last-child { border-bottom: none; }

    .stat b { color: #d4e4ff; }

    .next {
      width: 96px;
      height: 96px;
      background: #090f21;
      border: 1px solid #2a3a64;
      image-rendering: pixelated;
      display: block;
      margin: 4px auto 0;
    }

    .buttons {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    button {
      font: inherit;
      border: 1px solid #4d6599;
      border-radius: 8px;
      background: var(--btn);
      color: var(--text);
      padding: 9px 8px;
      cursor: pointer;
      font-weight: 700;
    }

    button:hover { background: var(--btn-h); }

    .btn-start { color: var(--accent); }
    .btn-reset { color: var(--danger); }

    .help {
      color: var(--muted);
      font-size: .84rem;
      line-height: 1.55;
      margin: 0;
    }

    .mobile {
      display: none;
      gap: 8px;
      margin-top: 10px;
    }

    .mobile button {
      min-height: 44px;
      font-size: 1rem;
      touch-action: manipulation;
      user-select: none;
      -webkit-user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
    }

    .center {
      text-align: center;
      color: #7ce8c0;
      font-size: .8rem;
      margin-top: 6px;
      min-height: 16px;
    }

    @media (max-width: 900px) {
      .layout { grid-template-columns: 1fr; }
      .board-wrap { margin: 0 auto; }
      .side { grid-template-columns: repeat(2, 1fr); }
    }

    @media (max-width: 640px) {
      canvas#board { width: 240px; height: 480px; }
      .side { grid-template-columns: 1fr; }
      .mobile { display: grid; }
    }
  </style>
</head>
<body>
  <main class="frame">
    <div class="top">
      <h1>TETRIS 1990</h1>
      <a class="portal" href="../">Volver al portal</a>
    </div>

    <section class="layout">
      <div class="board-wrap">
        <canvas id="board" width="300" height="600" aria-label="Tablero de Tetris"></canvas>
        <div class="center" id="msg">Pulsa INICIAR para jugar</div>
      </div>

      <aside class="side">
        <div class="card">
          <h2>Marcador</h2>
          <div class="stat"><span>Puntos</span><b id="score">0</b></div>
          <div class="stat"><span>Lineas</span><b id="lines">0</b></div>
          <div class="stat"><span>Nivel</span><b id="level">1</b></div>
          <div class="stat"><span>Record</span><b id="highScore">0</b></div>
        </div>

        <div class="card">
          <h2>Siguiente pieza</h2>
          <canvas id="next" class="next" width="96" height="96"></canvas>
        </div>

        <div class="card">
          <h2>Controles</h2>
          <p class="help">
            Toca la pieza para rotar<br />
            Arrastra la pieza con el dedo
          </p>
        </div>

        <div class="card">
          <h2>Partida</h2>
          <div class="buttons">
            <button class="btn-start" id="startBtn">Iniciar</button>
            <button id="pauseBtn">Pausar</button>
            <button class="btn-reset" id="resetBtn">Reiniciar</button>
            <button id="dropBtn">Caida</button>
            <button id="soundBtn">Sonido: ON</button>
          </div>
        </div>

        <div class="mobile">
          <div class="row">
            <button id="mLeft">◀</button>
            <button id="mRotate">⟳</button>
            <button id="mRight">▶</button>
          </div>
          <div class="row">
            <button id="mDown">▼</button>
            <button id="mDrop">⤓</button>
            <button id="mPause">II</button>
          </div>
        </div>
      </aside>
    </section>
  </main>

  <script>
    const COLS = 10;
    const ROWS = 20;
    const BLOCK = 30;

    const COLORS = {
      I: "#38bdf8",
      O: "#facc15",
      T: "#a78bfa",
      S: "#34d399",
      Z: "#fb7185",
      J: "#60a5fa",
      L: "#fb923c",
    };

    const SHAPES = {
      I: [[1, 1, 1, 1]],
      O: [[1, 1], [1, 1]],
      T: [[0, 1, 0], [1, 1, 1]],
      S: [[0, 1, 1], [1, 1, 0]],
      Z: [[1, 1, 0], [0, 1, 1]],
      J: [[1, 0, 0], [1, 1, 1]],
      L: [[0, 0, 1], [1, 1, 1]],
    };

    const boardCanvas = document.getElementById("board");
    const ctx = boardCanvas.getContext("2d");
    const nextCanvas = document.getElementById("next");
    const nextCtx = nextCanvas.getContext("2d");

    const scoreEl = document.getElementById("score");
    const linesEl = document.getElementById("lines");
    const levelEl = document.getElementById("level");
    const highScoreEl = document.getElementById("highScore");
    const msgEl = document.getElementById("msg");
    const soundBtn = document.getElementById("soundBtn");

    const HIGH_SCORE_KEY = "tetris1990_high_score";
    let highScore = Number(localStorage.getItem(HIGH_SCORE_KEY) || 0);
    highScoreEl.textContent = highScore;

    let soundEnabled = true;
    let audioCtx = null;
    let bgmTimer = null;
    let bgmIndex = 0;

    const BGM_BEAT_MS = 170;
    const KOROBEINIKI_MAIN = [
      "E5", "B4", "C5", "D5", "C5", "B4", "A4", "A4",
      "C5", "E5", "D5", "C5", "B4", "B4", "C5", "D5",
      "E5", "C5", "A4", "A4", null, "D5", "F5", "A5",
      "G5", "F5", "E5", "C5", "E5", "D5", "C5", "B4",
    ];

    const KOROBEINIKI_BASS = [
      "A2", "A2", "A2", "A2", "G2", "G2", "G2", "G2",
      "F2", "F2", "F2", "F2", "E2", "E2", "E2", "E2",
    ];

    const NOTE_FREQ = {
      E2: 82.41,
      F2: 87.31,
      G2: 98.0,
      A2: 110.0,
      A4: 440.0,
      B4: 493.88,
      C5: 523.25,
      D5: 587.33,
      E5: 659.25,
      F5: 698.46,
      G5: 783.99,
      A5: 880.0,
    };

    let board;
    let piece;
    let nextType;
    let score;
    let lines;
    let level;
    let dropTimer;
    let lastTime;
    let dropInterval;
    let running = false;
    let paused = false;
    let gameOver = false;

    function initBoardGestures() {
      let startX = 0;
      let startY = 0;
      let startTime = 0;
      let activeId = null;
      const TAP_MAX_MS = 240;
      const SWIPE_X_MIN = 28;
      const SWIPE_Y_MIN = 32;

      function onDown(e) {
        if (e.pointerType === "mouse") return;
        e.preventDefault();
        activeId = e.pointerId;
        startX = e.clientX;
        startY = e.clientY;
        startTime = performance.now();
      }

      function onUp(e) {
        if (activeId !== null && e.pointerId !== activeId) return;
        if (e.pointerType === "mouse") return;
        e.preventDefault();

        const dx = e.clientX - startX;
        const dy = e.clientY - startY;
        const adx = Math.abs(dx);
        const ady = Math.abs(dy);
        const elapsed = performance.now() - startTime;

        if (elapsed <= TAP_MAX_MS && adx < 12 && ady < 12) {
          rotatePiece();
          activeId = null;
          return;
        }

        if (adx > ady && adx >= SWIPE_X_MIN) {
          const steps = Math.max(1, Math.floor(adx / 30));
          for (let i = 0; i < steps; i++) {
            move(dx > 0 ? 1 : -1);
          }
        } else if (ady >= SWIPE_Y_MIN) {
          if (dy > 0) {
            if (ady > 120) {
              hardDrop();
            } else {
              const drops = Math.max(1, Math.floor(ady / 24));
              for (let i = 0; i < drops; i++) {
                softDrop();
              }
            }
          }
        }

        activeId = null;
      }

      function onCancel() {
        activeId = null;
      }

      boardCanvas.addEventListener("pointerdown", onDown, { passive: false });
      boardCanvas.addEventListener("pointerup", onUp, { passive: false });
      boardCanvas.addEventListener("pointercancel", onCancel);
      boardCanvas.addEventListener("contextmenu", (e) => e.preventDefault());
    }

    function ensureAudio() {
      if (!audioCtx) {
        const Ctx = window.AudioContext || window.webkitAudioContext;
        if (!Ctx) return null;
        audioCtx = new Ctx();
      }
      return audioCtx;
    }

    function playTone(freq, duration = 0.06, type = "square", volume = 0.04) {
      if (!soundEnabled) return;
      const ctxA = ensureAudio();
      if (!ctxA) return;
      const osc = ctxA.createOscillator();
      const gain = ctxA.createGain();
      osc.type = type;
      osc.frequency.value = freq;
      gain.gain.value = volume;
      osc.connect(gain);
      gain.connect(ctxA.destination);
      osc.start();
      gain.gain.exponentialRampToValueAtTime(0.0001, ctxA.currentTime + duration);
      osc.stop(ctxA.currentTime + duration);
    }

    function playLineClearSound(linesCleared) {
      const notes = [440, 554, 659, 880];
      const idx = Math.min(3, Math.max(0, linesCleared - 1));
      playTone(notes[idx], 0.09, "square", 0.05);
    }

    function playNote(note, duration = 0.14, type = "square", volume = 0.03) {
      if (!note || !NOTE_FREQ[note]) return;
      playTone(NOTE_FREQ[note], duration, type, volume);
    }

    function stopBgm() {
      if (bgmTimer) {
        clearTimeout(bgmTimer);
        bgmTimer = null;
      }
    }

    function scheduleBgmLoop() {
      if (!soundEnabled || !running || paused || gameOver) {
        stopBgm();
        return;
      }

      const melody = KOROBEINIKI_MAIN[bgmIndex % KOROBEINIKI_MAIN.length];
      const bass = KOROBEINIKI_BASS[bgmIndex % KOROBEINIKI_BASS.length];

      playNote(melody, 0.12, "square", 0.022);
      playNote(bass, 0.16, "triangle", 0.016);

      bgmIndex = (bgmIndex + 1) % 64;
      bgmTimer = setTimeout(scheduleBgmLoop, BGM_BEAT_MS);
    }

    function startBgm() {
      stopBgm();
      bgmIndex = 0;
      scheduleBgmLoop();
    }

    function updateHighScore() {
      if (score > highScore) {
        highScore = score;
        localStorage.setItem(HIGH_SCORE_KEY, String(highScore));
      }
      highScoreEl.textContent = highScore;
    }

    function makeBoard() {
      return Array.from({ length: ROWS }, () => Array(COLS).fill(0));
    }

    function randomType() {
      const keys = Object.keys(SHAPES);
      return keys[Math.floor(Math.random() * keys.length)];
    }

    function createPiece(type) {
      const shape = SHAPES[type].map(row => [...row]);
      return {
        type,
        shape,
        x: Math.floor(COLS / 2) - Math.ceil(shape[0].length / 2),
        y: -1,
      };
    }

    function rotate(shape) {
      const rows = shape.length;
      const cols = shape[0].length;
      const out = Array.from({ length: cols }, () => Array(rows).fill(0));
      for (let y = 0; y < rows; y++) {
        for (let x = 0; x < cols; x++) {
          out[x][rows - y - 1] = shape[y][x];
        }
      }
      return out;
    }

    function collides(px, py, shape) {
      for (let y = 0; y < shape.length; y++) {
        for (let x = 0; x < shape[y].length; x++) {
          if (!shape[y][x]) continue;
          const nx = px + x;
          const ny = py + y;
          if (nx < 0 || nx >= COLS || ny >= ROWS) return true;
          if (ny >= 0 && board[ny][nx]) return true;
        }
      }
      return false;
    }

    function mergePiece() {
      for (let y = 0; y < piece.shape.length; y++) {
        for (let x = 0; x < piece.shape[y].length; x++) {
          if (!piece.shape[y][x]) continue;
          const by = piece.y + y;
          const bx = piece.x + x;
          if (by >= 0) {
            board[by][bx] = piece.type;
          }
        }
      }
    }

    function clearLines() {
      let cleared = 0;
      for (let y = ROWS - 1; y >= 0; y--) {
        if (board[y].every(cell => cell !== 0)) {
          board.splice(y, 1);
          board.unshift(Array(COLS).fill(0));
          cleared++;
          y++;
        }
      }

      if (cleared > 0) {
        const points = [0, 100, 300, 500, 800][cleared] || 0;
        score += points * level;
        lines += cleared;
        level = Math.floor(lines / 10) + 1;
        dropInterval = Math.max(90, 700 - (level - 1) * 60);
        playLineClearSound(cleared);
      }
    }

    function spawnPiece() {
      piece = createPiece(nextType || randomType());
      nextType = randomType();
      drawNext();
      if (collides(piece.x, piece.y, piece.shape)) {
        running = false;
        gameOver = true;
        msgEl.textContent = "GAME OVER - Pulsa Reiniciar";
        stopBgm();
        playTone(160, 0.22, "sawtooth", 0.06);
        updateHighScore();
      }
    }

    function hardDrop() {
      while (!collides(piece.x, piece.y + 1, piece.shape)) {
        piece.y++;
        score += 2;
      }
      playTone(520, 0.05, "square", 0.045);
      lockStep();
    }

    function lockStep() {
      mergePiece();
      clearLines();
      updateStats();
      spawnPiece();
    }

    function move(dx) {
      if (!running || paused || gameOver) return;
      if (!collides(piece.x + dx, piece.y, piece.shape)) {
        piece.x += dx;
        playTone(280, 0.03, "square", 0.025);
      }
    }

    function softDrop() {
      if (!running || paused || gameOver) return;
      if (!collides(piece.x, piece.y + 1, piece.shape)) {
        piece.y++;
        score += 1;
      } else {
        lockStep();
      }
      updateStats();
    }

    function rotatePiece() {
      if (!running || paused || gameOver) return;
      const rotated = rotate(piece.shape);
      if (!collides(piece.x, piece.y, rotated)) {
        piece.shape = rotated;
        playTone(360, 0.04, "square", 0.03);
        return;
      }
      if (!collides(piece.x - 1, piece.y, rotated)) {
        piece.x -= 1;
        piece.shape = rotated;
        playTone(360, 0.04, "square", 0.03);
        return;
      }
      if (!collides(piece.x + 1, piece.y, rotated)) {
        piece.x += 1;
        piece.shape = rotated;
        playTone(360, 0.04, "square", 0.03);
      }
    }

    function drawCell(target, x, y, color, size) {
      target.fillStyle = color;
      target.fillRect(x * size, y * size, size, size);
      target.strokeStyle = "#0b1328";
      target.lineWidth = 2;
      target.strokeRect(x * size, y * size, size, size);
      target.fillStyle = "rgba(255,255,255,.18)";
      target.fillRect(x * size + 3, y * size + 3, size - 6, 6);
    }

    function drawBoard() {
      ctx.fillStyle = "#050a16";
      ctx.fillRect(0, 0, boardCanvas.width, boardCanvas.height);

      for (let y = 0; y < ROWS; y++) {
        for (let x = 0; x < COLS; x++) {
          const cell = board[y][x];
          if (cell) {
            drawCell(ctx, x, y, COLORS[cell], BLOCK);
          }
        }
      }

      if (piece) {
        for (let y = 0; y < piece.shape.length; y++) {
          for (let x = 0; x < piece.shape[y].length; x++) {
            if (!piece.shape[y][x]) continue;
            const gx = piece.x + x;
            const gy = piece.y + y;
            if (gy >= 0) {
              drawCell(ctx, gx, gy, COLORS[piece.type], BLOCK);
            }
          }
        }
      }
    }

    function drawNext() {
      nextCtx.fillStyle = "#050a16";
      nextCtx.fillRect(0, 0, nextCanvas.width, nextCanvas.height);
      const shape = SHAPES[nextType];
      const unit = 20;
      const startX = Math.floor((nextCanvas.width - shape[0].length * unit) / 2);
      const startY = Math.floor((nextCanvas.height - shape.length * unit) / 2);
      for (let y = 0; y < shape.length; y++) {
        for (let x = 0; x < shape[y].length; x++) {
          if (!shape[y][x]) continue;
          nextCtx.fillStyle = COLORS[nextType];
          nextCtx.fillRect(startX + x * unit, startY + y * unit, unit, unit);
          nextCtx.strokeStyle = "#0b1328";
          nextCtx.strokeRect(startX + x * unit, startY + y * unit, unit, unit);
        }
      }
    }

    function updateStats() {
      scoreEl.textContent = score;
      linesEl.textContent = lines;
      levelEl.textContent = level;
      updateHighScore();
    }

    function tick(time = 0) {
      if (!running || paused || gameOver) {
        drawBoard();
        return;
      }

      if (!lastTime) lastTime = time;
      const delta = time - lastTime;
      lastTime = time;
      dropTimer += delta;

      if (dropTimer >= dropInterval) {
        softDrop();
        dropTimer = 0;
      }

      drawBoard();
      requestAnimationFrame(tick);
    }

    function startGame() {
      if (running && !gameOver) return;
      board = makeBoard();
      score = 0;
      lines = 0;
      level = 1;
      dropInterval = 700;
      dropTimer = 0;
      lastTime = 0;
      gameOver = false;
      paused = false;
      nextType = randomType();
      spawnPiece();
      updateStats();
      running = true;
      msgEl.textContent = "Jugando";
      playTone(620, 0.09, "square", 0.05);
      startBgm();
      requestAnimationFrame(tick);
    }

    function togglePause() {
      if (!running || gameOver) return;
      paused = !paused;
      msgEl.textContent = paused ? "PAUSA" : "Jugando";
      playTone(paused ? 220 : 420, 0.06, "square", 0.04);
      if (!paused) {
        startBgm();
        lastTime = 0;
        requestAnimationFrame(tick);
      } else {
        stopBgm();
      }
    }

    function resetGame() {
      running = false;
      paused = false;
      gameOver = false;
      stopBgm();
      board = makeBoard();
      piece = null;
      nextType = randomType();
      score = 0;
      lines = 0;
      level = 1;
      dropInterval = 700;
      updateStats();
      drawNext();
      drawBoard();
      msgEl.textContent = "Pulsa INICIAR para jugar";
    }

    document.addEventListener("keydown", (e) => {
      if (["ArrowLeft", "ArrowRight", "ArrowUp", "ArrowDown", " "].includes(e.key)) {
        e.preventDefault();
      }
      if (e.key === "ArrowLeft") move(-1);
      if (e.key === "ArrowRight") move(1);
      if (e.key === "ArrowUp") rotatePiece();
      if (e.key === "ArrowDown") softDrop();
      if (e.key === " ") {
        if (running && !paused && !gameOver) hardDrop();
      }
      if (e.key.toLowerCase() === "p") togglePause();
    });

    document.getElementById("startBtn").addEventListener("click", startGame);
    document.getElementById("pauseBtn").addEventListener("click", togglePause);
    document.getElementById("resetBtn").addEventListener("click", resetGame);
    document.getElementById("dropBtn").addEventListener("click", () => {
      if (running && !paused && !gameOver) hardDrop();
    });

    function bindHoldControl(buttonId, action, repeatMs = 0) {
      const btn = document.getElementById(buttonId);
      if (!btn) return;

      let timer = null;
      const clear = () => {
        if (timer) {
          clearInterval(timer);
          timer = null;
        }
      };

      const start = (e) => {
        e.preventDefault();
        action();
        if (repeatMs > 0) {
          timer = setInterval(action, repeatMs);
        }
      };

      btn.addEventListener("pointerdown", start);
      btn.addEventListener("pointerup", clear);
      btn.addEventListener("pointercancel", clear);
      btn.addEventListener("pointerleave", clear);
      btn.addEventListener("contextmenu", (e) => e.preventDefault());

      // Fallback para navegadores sin Pointer Events.
      btn.addEventListener("touchstart", start, { passive: false });
      btn.addEventListener("touchend", clear);
      btn.addEventListener("touchcancel", clear);
    }

    bindHoldControl("mLeft", () => move(-1), 90);
    bindHoldControl("mRight", () => move(1), 90);
    bindHoldControl("mRotate", rotatePiece);
    bindHoldControl("mDown", softDrop, 70);
    bindHoldControl("mDrop", () => {
      if (running && !paused && !gameOver) hardDrop();
    });
    bindHoldControl("mPause", togglePause);

    soundBtn.addEventListener("click", () => {
      soundEnabled = !soundEnabled;
      soundBtn.textContent = `Sonido: ${soundEnabled ? "ON" : "OFF"}`;
      if (soundEnabled) {
        playTone(700, 0.05, "square", 0.045);
        if (running && !paused && !gameOver) {
          startBgm();
        }
      } else {
        stopBgm();
      }
    });

    initBoardGestures();
    resetGame();
  </script>
</body>
</html>
